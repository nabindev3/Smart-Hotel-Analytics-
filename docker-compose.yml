version: "3.9"

# ═══════════════════════════════════════════════════════════════════════
#  Smart Hotel Analytics — Docker Compose
#  Services: fastapi-backend · streamlit-frontend · mlflow-server
# ═══════════════════════════════════════════════════════════════════════

services:

  # ── 1. FastAPI ML Backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hotel_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
      - ./monitoring:/app/monitoring:ro
      - ./src:/app/src:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HF_API_TOKEN=${HF_API_TOKEN:-}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hotel_net

  # ── 2. Streamlit Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: hotel_frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hotel_net

  # ── 3. MLflow Tracking Server ─────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: hotel_mlflow
    command: >
      sh -c "pip install mlflow -q &&
             mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:////mlruns/mlflow.db
               --default-artifact-root /mlruns/artifacts"
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlruns
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - hotel_net

networks:
  hotel_net:
    driver: bridge

volumes:
  mlruns_data:
